<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハイライト管理 — 汎用版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#111214;--bg2:#18191d;--bg3:#1f2025;--bg4:#26272e;--bg5:#2e303a;
  --line:#2a2c35;--line2:#363840;
  --acc:#a78bfa;--acc2:#7c3aed;
  --gold:#fbbf24;--green:#4ade80;--red:#f87171;
  --text:#e4e5ea;--text2:#9496a1;--text3:#555760;
  --r:6px;--r2:10px;--sw:250px;
}
*{box-sizing:border-box;margin:0;padding:0;}
::selection{background:var(--acc);color:#fff;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px;}

.hd{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:var(--bg2);border-bottom:1px solid var(--line);flex-shrink:0;gap:12px;}
.hd-logo{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--acc);letter-spacing:.04em;white-space:nowrap;}
.hd-logo .pip{width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 8px var(--acc);flex-shrink:0;}
.hd-actions{display:flex;gap:8px;align-items:center;}

.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r);font-family:'Noto Sans JP',sans-serif;font-size:11.5px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;border:1px solid var(--line2);background:var(--bg3);color:var(--text2);}
.btn:hover{border-color:var(--acc);color:var(--acc);background:var(--bg4);}
.btn.primary{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:700;}
.btn.primary:hover{background:#c4b5fd;border-color:#c4b5fd;color:#1a0a3a;}
.btn.ghost{background:transparent;border-color:var(--line2);}
.btn.ghost:hover{border-color:var(--acc);color:var(--acc);}
.btn.danger{border-color:var(--red);color:var(--red);background:transparent;}
.btn.danger:hover{background:var(--red);color:#fff;}
.btn.sm{padding:4px 9px;font-size:11px;}
.btn.icon{padding:5px 8px;font-size:13px;line-height:1;}

.main{display:flex;flex:1;overflow:hidden;}

.sb{width:var(--sw);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);}
.sb-label{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);}
.sb-count{font-size:10px;background:var(--bg4);border:1px solid var(--line2);color:var(--text2);padding:1px 7px;border-radius:10px;}
.sb-list{flex:1;overflow-y:auto;padding:6px 0;}
.si{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .12s;}
.si:hover{background:var(--bg3);border-left-color:var(--line2);}
.si.active{background:var(--bg4);border-left-color:var(--acc);}
.si-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.1);}
.si-name{flex:1;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.si-badge{font-size:10px;color:var(--text3);background:rgba(0,0,0,.3);padding:1px 6px;border-radius:8px;flex-shrink:0;}
.si.active .si-name{color:var(--text);font-weight:500;}
.sb-foot{border-top:1px solid var(--line);padding:10px 12px;}

.ct{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.ct-scroll{flex:1;overflow-y:auto;padding:22px 24px;}

.ed-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:16px;}
.ed-title-wrap{flex:1;}
.ed-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);line-height:1.2;}
.ed-sub{font-size:11px;color:var(--text3);margin-top:4px;}
.ed-actions{display:flex;gap:6px;flex-shrink:0;}

.div{height:1px;background:var(--line);margin:18px 0;}

.stat-row{display:flex;gap:12px;margin-bottom:20px;}
.stat{flex:1;background:var(--bg3);border:1px solid var(--line);border-radius:var(--r2);padding:12px 14px;display:flex;flex-direction:column;gap:3px;}
.stat-n{font-family:'Noto Sans JP',sans-serif;font-size:24px;font-weight:700;color:var(--acc);}
.stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}

.fl{margin-bottom:16px;}
.fl-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:7px;}
input[type=text]{width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:var(--r);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s;}
input[type=text]:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(167,139,250,.1);}

.color-row{display:flex;align-items:center;gap:10px;}
input[type=color]{width:42px;height:38px;border:1px solid var(--line);border-radius:var(--r);background:var(--bg3);cursor:pointer;padding:3px;flex-shrink:0;}
.color-chip{flex:1;height:38px;border-radius:var(--r);border:1px solid var(--line);display:flex;align-items:center;padding:0 12px;font-size:11.5px;font-family:'JetBrains Mono',monospace;font-weight:600;color:rgba(0,0,0,.65);transition:background .2s;}

.popup-info{background:var(--bg3);border:1px solid var(--line2);border-radius:var(--r2);padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.popup-info-icon{font-size:18px;flex-shrink:0;}
.popup-info-text{font-size:12px;color:var(--text2);line-height:1.6;}
.popup-info-text strong{color:var(--acc);font-weight:600;}
.popup-preview-chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;border:1px solid rgba(255,255,255,.1);margin-top:6px;}

.kw-input-row{display:flex;gap:8px;margin-bottom:10px;}
.kw-input-row input{flex:1;}
.kw-input-err{font-size:11px;color:var(--red);margin-top:4px;min-height:16px;}

.kw-tags{display:flex;flex-wrap:wrap;gap:6px;padding:10px;background:var(--bg3);border:1px solid var(--line);border-radius:var(--r);min-height:48px;}
.kw-tags-empty{font-size:12px;color:var(--text3);padding:4px 0;}
.kw-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 8px 3px 10px;background:var(--bg4);border:1px solid var(--line2);border-radius:20px;font-size:12px;color:var(--text2);}
.kw-tag-x{width:16px;height:16px;border-radius:50%;background:transparent;border:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;line-height:1;padding:0;transition:all .12s;flex-shrink:0;}
.kw-tag-x:hover{background:var(--red);color:#fff;}
.kw-count{font-size:10.5px;color:var(--text2);margin-top:6px;}

.bm{background:var(--bg2);border-top:1px solid var(--line);padding:14px 22px;flex-shrink:0;}
.bm-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.bm-title{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:7px;}
.bm-title::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--acc);box-shadow:0 0 6px var(--acc);flex-shrink:0;}
.bm-meta{display:flex;gap:8px;align-items:center;}
.bm-stat{font-size:10.5px;color:var(--text3);}
.bm-code-wrap{position:relative;}
.bm-code{background:var(--bg);border:1px solid var(--line);border-radius:var(--r);padding:9px 12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--acc);max-height:48px;overflow-y:auto;word-break:break-all;white-space:pre-wrap;line-height:1.6;cursor:text;user-select:all;}
.bm-copied{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--green);color:#000;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:4px;pointer-events:none;opacity:0;transition:opacity .25s;}
.bm-copied.on{opacity:1;}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:12px;color:var(--text3);padding:40px;}
.empty-icon{font-size:44px;opacity:.4;}
.empty-text{font-size:13px;line-height:1.8;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:14px;padding:24px;width:500px;max-width:92vw;max-height:88vh;display:flex;flex-direction:column;gap:14px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
.modal-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;padding-top:4px;border-top:1px solid var(--line);}

.search-bar{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--line);border-radius:var(--r);padding:7px 12px;}
.search-bar input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;}
.search-bar .ico{color:var(--text3);font-size:14px;}

.list-add-section{background:var(--bg3);border:1px solid var(--line);border-radius:var(--r);padding:12px;}
.list-add-section .sec-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.list-add-row{display:flex;gap:8px;align-items:flex-start;}
.list-add-row input{flex:1;}
.list-add-err{font-size:11px;color:var(--red);margin-top:4px;min-height:14px;}
.list-bulk-row{display:flex;gap:8px;align-items:flex-start;margin-top:10px;}
.list-bulk-row textarea{flex:1;background:var(--bg4);border:1px solid var(--line);border-radius:var(--r);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11.5px;padding:8px 10px;outline:none;resize:none;height:70px;line-height:1.6;}
.list-bulk-row textarea:focus{border-color:var(--acc);}

.kw-list-wrap{background:var(--bg3);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;max-height:260px;overflow-y:auto;}
.kw-list-empty{padding:20px;text-align:center;color:var(--text3);font-size:12.5px;}
.kw-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--line);transition:background .1s;}
.kw-item:last-child{border-bottom:none;}
.kw-item:hover{background:var(--bg4);}
.kw-item-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.kw-item-name{flex:1;font-size:12.5px;font-family:'JetBrains Mono',monospace;}
.kw-item-group{font-size:10px;color:var(--text3);flex-shrink:0;}
.kw-del{width:20px;height:20px;border-radius:4px;background:transparent;border:1px solid transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .12s;flex-shrink:0;}
.kw-del:hover{background:var(--red);border-color:var(--red);color:#fff;}
.dup-badge{font-size:9.5px;background:#f8717122;border:1px solid var(--red);color:var(--red);padding:1px 6px;border-radius:4px;font-weight:700;flex-shrink:0;}

.add-input{width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:var(--r);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:10px 12px;outline:none;}
.add-input:focus{border-color:var(--acc);}

#toast{position:fixed;bottom:22px;right:22px;background:var(--bg3);border:1px solid var(--line2);padding:10px 16px;border-radius:var(--r2);font-size:12.5px;z-index:999;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
#toast.on{opacity:1;transform:translateY(0);}
#toast.ok{border-color:var(--green);color:var(--green);}
#toast.err{border-color:var(--red);color:var(--red);}
#toast.warn{border-color:var(--gold);color:var(--gold);}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-logo"><div class="pip"></div>ハイライト管理 — 汎用版</div>
  <div class="hd-actions">
    <button class="btn sm ghost" onclick="openListModal()">📋 キーワードリスト</button>
    <button class="btn sm ghost" onclick="openAddGroup()">＋ 追加</button>
    <button class="btn sm ghost" onclick="backupJSON()">💾 バックアップ</button>
    <button class="btn sm ghost" onclick="document.getElementById('rf').click()">📂 復元</button>
    <input type="file" id="rf" accept=".json" style="display:none" onchange="restoreJSON(event)">
  </div>
</div>

<div class="main">
  <div class="sb">
    <div class="sb-head">
      <span class="sb-label">グループ</span>
      <span class="sb-count" id="sbCount">0</span>
    </div>
    <div class="sb-list" id="sbList"></div>
    <div class="sb-foot">
      <button class="btn sm" style="width:100%" onclick="openAddGroup()">＋ グループを追加</button>
    </div>
  </div>

  <div class="ct">
    <div class="ct-scroll" id="ctMain">
      <div class="empty"><div class="empty-icon">✨</div><div class="empty-text">「＋ グループを追加」から<br>ハイライトグループを作成してください</div></div>
    </div>
    <div class="bm">
      <div class="bm-row">
        <div class="bm-title">生成済みブックマークレット</div>
        <div class="bm-meta">
          <span class="bm-stat" id="bmStat">0グループ / 0キーワード</span>
          <button class="btn sm primary" onclick="copyBM()">📋 コピー</button>
        </div>
      </div>
      <div class="bm-code-wrap">
        <div class="bm-code" id="bmCode">javascript:void(0)</div>
        <div class="bm-copied" id="bmCopied">✓ コピー完了</div>
      </div>
    </div>
  </div>
</div>

<!-- ADD GROUP MODAL -->
<div class="overlay" id="addModal">
  <div class="modal" style="width:360px;">
    <div class="modal-head">
      <div class="modal-title">✨ グループを追加</div>
      <button class="btn icon ghost" onclick="closeAddGroup()">✕</button>
    </div>
    <div class="modal-body">
      <div class="fl">
        <div class="fl-label">グループ名</div>
        <input class="add-input" id="addName" placeholder="例: 直送可、要注意…" onkeydown="if(event.key==='Enter')confirmAddGroup()">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="closeAddGroup()">キャンセル</button>
      <button class="btn primary" onclick="confirmAddGroup()">追加</button>
    </div>
  </div>
</div>

<!-- LIST MODAL -->
<div class="overlay" id="listModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">📋 キーワード管理</div>
      <button class="btn icon ghost" onclick="closeListModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="list-add-section">
        <div class="sec-title">1件追加</div>
        <div class="list-add-row">
          <input type="text" id="listAddInput" placeholder="キーワードを入力…">
          <select id="listAddGroup" style="background:var(--bg4);border:1px solid var(--line);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:12px;padding:8px 10px;outline:none;"></select>
          <button class="btn primary sm" onclick="listAddOne()">追加</button>
        </div>
        <div class="list-add-err" id="listAddErr"></div>
      </div>
      <div class="list-add-section">
        <div class="sec-title">まとめて追加（1行1キーワード）</div>
        <div class="list-bulk-row">
          <textarea id="listBulkInput" placeholder="キーワードA&#10;キーワードB&#10;キーワードC"></textarea>
          <div style="display:flex;flex-direction:column;gap:6px;">
            <select id="listBulkGroup" style="background:var(--bg4);border:1px solid var(--line);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:12px;padding:8px 10px;outline:none;"></select>
            <button class="btn primary sm" onclick="listAddBulk()">一括追加</button>
          </div>
        </div>
        <div class="list-add-err" id="listBulkErr"></div>
      </div>
      <div class="search-bar">
        <span class="ico">🔍</span>
        <input id="listSearch" placeholder="キーワードを検索…" oninput="renderListItems()">
      </div>
      <div class="kw-list-wrap" id="kwListWrap"></div>
    </div>
    <div class="modal-foot">
      <span style="font-size:11px;color:var(--text3);margin-right:auto" id="listStat"></span>
      <button class="btn ghost" onclick="closeListModal()">閉じる</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SK='hl_generic_v4';
const PAL=['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8','#DDA0DD','#90EE90','#F0E68C','#87CEEB'];
const DEMO=[
  {name:'直送可',color:'#4ade80',keywords:'スチールラック 大型\nウォーターサーバー本体\n業務用エアコン\nマッサージチェア'},
  {name:'要注意',color:'#f87171',keywords:'ガラス食器セット\n陶磁器\n精密電子機器\n鏡・ガラスパネル'},
  {name:'冷凍便',color:'#60a5fa',keywords:'アイスクリーム\n冷凍食品\n生鮮肉\n冷凍シーフード'},
  {name:'大型便',color:'#fbbf24',keywords:'ソファ 3人掛け\nダブルベッド\n食器棚\nドラム式洗濯機'},
];

let groups=[], activeId=null, saveT=null;

function load(){
  try{
    const r=localStorage.getItem(SK);
    if(r){groups=JSON.parse(r);}
    else{groups=DEMO.map((d,i)=>({id:'g'+(i+1),name:d.name,color:d.color,keywords:d.keywords}));}
  }catch(e){groups=DEMO.map((d,i)=>({id:'g'+(i+1),name:d.name,color:d.color,keywords:d.keywords}));}
}
function save(){clearTimeout(saveT);saveT=setTimeout(()=>localStorage.setItem(SK,JSON.stringify(groups)),300);}
function parseKW(t){return(t||'').split(/[\n\r]+/).map(s=>s.trim()).filter(s=>s.length>0);}
function allKW(){let a=[];groups.forEach(g=>parseKW(g.keywords).forEach(k=>a.push({kw:k,gid:g.id,gname:g.name,color:g.color})));return a;}

function renderSB(){
  const el=document.getElementById('sbList');el.innerHTML='';
  document.getElementById('sbCount').textContent=groups.length;
  if(!groups.length){el.innerHTML='<div style="padding:20px 16px;font-size:12px;color:var(--text3);text-align:center;line-height:1.7">グループがありません<br>下の「＋」から追加</div>';return;}
  groups.forEach(g=>{
    const kws=parseKW(g.keywords);
    const d=document.createElement('div');
    d.className='si'+(g.id===activeId?' active':'');
    d.innerHTML=`<div class="si-dot" style="background:${g.color}"></div><span class="si-name">${esc(g.name)}</span><span class="si-badge">${kws.length}</span>`;
    d.onclick=()=>sel(g.id);el.appendChild(d);
  });
}

function renderCT(){
  const el=document.getElementById('ctMain');
  const g=groups.find(x=>x.id===activeId);
  if(!g){el.innerHTML='<div class="empty"><div class="empty-icon">✨</div><div class="empty-text">「＋ グループを追加」から<br>ハイライトグループを作成してください</div></div>';return;}
  const kws=parseKW(g.keywords);
  let tot=0;groups.forEach(gr=>tot+=parseKW(gr.keywords).length);
  const act=groups.filter(gr=>parseKW(gr.keywords).length>0).length;
  const lv=luma(g.color);
  el.innerHTML=`
  <div class="stat-row">
    <div class="stat"><div class="stat-n">${groups.length}</div><div class="stat-l">グループ数</div></div>
    <div class="stat"><div class="stat-n">${tot}</div><div class="stat-l">総キーワード</div></div>
    <div class="stat"><div class="stat-n">${act}</div><div class="stat-l">登録済み</div></div>
  </div>
  <div class="ed-head">
    <div class="ed-title-wrap">
      <div class="ed-title">${esc(g.name)}</div>
      <div class="ed-sub">ホバーポップアップ：「${esc(g.name)}」を表示</div>
    </div>
    <div class="ed-actions">
      <button class="btn sm ghost" onclick="renameG('${g.id}')">✏️ 名前変更</button>
      <button class="btn sm danger" onclick="delG('${g.id}')">🗑 削除</button>
    </div>
  </div>
  <div class="div"></div>
  <div class="fl">
    <div class="fl-label">ハイライト色</div>
    <div class="color-row">
      <input type="color" id="cp" value="${g.color}" oninput="onColor('${g.id}',this.value)">
      <div class="color-chip" id="cc" style="background:${g.color}">${g.color.toUpperCase()}</div>
    </div>
  </div>
  <div class="popup-info">
    <div class="popup-info-icon">💬</div>
    <div class="popup-info-text">
      ハイライト箇所にマウスを乗せると<strong>「${esc(g.name)}」</strong>がポップアップ表示されます。<br>
      <div class="popup-preview-chip" id="pChip" style="background:${g.color};color:${lv>140?'#000':'#fff'}">${esc(g.name)}</div>
    </div>
  </div>
  <div class="fl">
    <div class="fl-label">キーワードを1件ずつ登録</div>
    <div class="kw-input-row">
      <input type="text" id="kwInput" placeholder="キーワードを入力して追加…" onkeydown="if(event.key==='Enter')addKW('${g.id}')">
      <button class="btn primary sm" onclick="addKW('${g.id}')">＋ 追加</button>
    </div>
    <div class="kw-input-err" id="kwErr"></div>
    <div class="kw-count">${kws.length} 件登録済み</div>
    <div class="kw-tags" id="kwTags">
      ${kws.length===0?'<span class="kw-tags-empty">キーワードがまだ登録されていません</span>':kws.map(k=>`<span class="kw-tag"><span>${esc(k)}</span><button class="kw-tag-x" onclick="removeKW('${g.id}','${esc(k)}')">×</button></span>`).join('')}
    </div>
  </div>`;
}

function addKW(gid){
  const g=groups.find(x=>x.id===gid);if(!g)return;
  const input=document.getElementById('kwInput');
  const err=document.getElementById('kwErr');
  const val=input.value.trim();
  if(!val)return;
  const kws=parseKW(g.keywords);
  if(kws.includes(val)){err.textContent='⚠️ すでに登録されています';setTimeout(()=>err.textContent='',2500);return;}
  kws.push(val);g.keywords=kws.join('\n');
  input.value='';err.textContent='';
  renderCT();renderSB();renderBM();save();
  setTimeout(()=>{const i=document.getElementById('kwInput');if(i)i.focus();},50);
}

function removeKW(gid,kw){
  const g=groups.find(x=>x.id===gid);if(!g)return;
  g.keywords=parseKW(g.keywords).filter(k=>k!==kw).join('\n');
  renderCT();renderSB();renderBM();save();
}

function renderBM(){
  const entries=groups.map(g=>({color:g.color,label:g.name,kws:parseKW(g.keywords)})).filter(e=>e.kws.length>0);
  const tot=entries.reduce((s,e)=>s+e.kws.length,0);
  document.getElementById('bmStat').textContent=`${entries.length}グループ / ${tot}キーワード`;
  if(!entries.length){document.getElementById('bmCode').textContent='javascript:void(0) /* キーワードを登録してください */';return;}
  const gc=entries.map(e=>{
    const ex=e.kws.map(k=>k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
    const lb=e.label.replace(/\\/g,'\\\\').replace(/"/g,'\\"');
    return `{p:/${ex.join('|')}/gi,c:"${e.color}",l:"${lb}"}`;
  }).join(',');
  const bm=`javascript:(function(){`
    +`document.querySelectorAll('mark[data-hl]').forEach(function(m){m.parentNode.replaceChild(document.createTextNode(m.textContent),m);});`
    +`var t=document.getElementById('__hltip__');if(t)t.remove();`
    +`var G=[${gc}];`
    +`t=document.createElement('div');t.id='__hltip__';`
    +`t.style.cssText='position:fixed;z-index:2147483647;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:bold;pointer-events:none;opacity:0;transition:opacity .15s;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.4);';`
    +`document.body.appendChild(t);`
    +`var W=document.createTreeWalker(document.body,4,null,false);var ns=[],n;`
    +`while(n=W.nextNode()){var p=n.parentNode;if(p&&p.nodeName!=='SCRIPT'&&p.nodeName!=='STYLE'&&p.nodeName!=='MARK'&&p.id!=='__hltip__')ns.push(n);}`
    +`ns.forEach(function(nd){var h=nd.nodeValue,hit=false;G.forEach(function(g){g.p.lastIndex=0;if(g.p.test(h))hit=true;});if(!hit)return;G.forEach(function(g){g.p.lastIndex=0;h=h.replace(g.p,function(m){return'<mark data-hl="1" data-c="'+g.c+'" data-l="'+g.l+'" style="background:'+g.c+';color:#000;padding:0 3px;border-radius:3px;cursor:default;">'+m+'</mark>';});});var f=document.createElement('span');f.innerHTML=h;nd.parentNode.replaceChild(f,nd);});`
    +`document.addEventListener('mouseover',function(e){var m=e.target.closest('mark[data-hl]');if(!m)return;var l=m.getAttribute('data-l');if(!l)return;var c=m.getAttribute('data-c')||'#ffdd00';t.textContent=l;t.style.background=c;var r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);t.style.color=(0.299*r+0.587*g+0.114*b)>140?'#000':'#fff';var rc=m.getBoundingClientRect();t.style.left=rc.left+'px';t.style.top=(rc.top-32)+'px';t.style.opacity='1';});`
    +`document.addEventListener('mouseout',function(e){if(e.target.closest('mark[data-hl]'))t.style.opacity='0';});`
    +`})();`;
  document.getElementById('bmCode').textContent=bm;
}

function openListModal(){
  populateGroupSelects();
  document.getElementById('listSearch').value='';
  document.getElementById('listAddInput').value='';
  document.getElementById('listBulkInput').value='';
  document.getElementById('listAddErr').textContent='';
  document.getElementById('listBulkErr').textContent='';
  renderListItems();
  document.getElementById('listModal').classList.add('on');
}
function closeListModal(){document.getElementById('listModal').classList.remove('on');}

function populateGroupSelects(){
  ['listAddGroup','listBulkGroup'].forEach(id=>{
    const sel=document.getElementById(id);
    sel.innerHTML=groups.map(g=>`<option value="${g.id}">${esc(g.name)}</option>`).join('');
    if(activeId)sel.value=activeId;
  });
}

function listAddOne(){
  const val=document.getElementById('listAddInput').value.trim();
  const gid=document.getElementById('listAddGroup').value;
  const err=document.getElementById('listAddErr');
  const g=groups.find(x=>x.id===gid);
  if(!val||!g)return;
  const kws=parseKW(g.keywords);
  if(kws.includes(val)){err.textContent='⚠️ すでに登録されています';setTimeout(()=>err.textContent='',2500);return;}
  kws.push(val);g.keywords=kws.join('\n');
  document.getElementById('listAddInput').value='';err.textContent='';
  renderListItems();renderSB();renderBM();save();
  if(activeId===gid)renderCT();
  toast(`「${val}」を追加しました`,'ok');
}

function listAddBulk(){
  const text=document.getElementById('listBulkInput').value;
  const gid=document.getElementById('listBulkGroup').value;
  const err=document.getElementById('listBulkErr');
  const g=groups.find(x=>x.id===gid);
  if(!text.trim()||!g)return;
  const newKws=parseKW(text);
  const existing=parseKW(g.keywords);
  let added=0,skipped=0;
  newKws.forEach(k=>{if(existing.includes(k)){skipped++;}else{existing.push(k);added++;}});
  g.keywords=existing.join('\n');
  document.getElementById('listBulkInput').value='';
  err.textContent=skipped>0?`⚠️ ${skipped}件は重複のためスキップ`:'';
  if(skipped>0)setTimeout(()=>err.textContent='',3000);
  renderListItems();renderSB();renderBM();save();
  if(activeId===gid)renderCT();
  toast(`${added}件追加${skipped?`（${skipped}件スキップ）`:''}`,'ok');
}

function renderListItems(){
  const q=(document.getElementById('listSearch').value||'').trim().toLowerCase();
  const wrap=document.getElementById('kwListWrap');
  const items=allKW();
  const seen={},dups=new Set();
  items.forEach(it=>{const key=it.kw.toLowerCase();if(seen[key])dups.add(key);else seen[key]=true;});
  const filtered=q?items.filter(it=>it.kw.toLowerCase().includes(q)||it.gname.toLowerCase().includes(q)):items;
  document.getElementById('listStat').textContent=`全 ${items.length} 件 / 表示 ${filtered.length} 件`;
  if(!filtered.length){wrap.innerHTML=`<div class="kw-list-empty">${q?'一致するキーワードがありません':'キーワードが登録されていません'}</div>`;return;}
  wrap.innerHTML='';
  filtered.forEach(it=>{
    const isDup=dups.has(it.kw.toLowerCase());
    const div=document.createElement('div');div.className='kw-item';
    div.innerHTML=`<div class="kw-item-dot" style="background:${it.color}"></div><span class="kw-item-name">${esc(it.kw)}</span>${isDup?'<span class="dup-badge">重複</span>':''}<span class="kw-item-group">${esc(it.gname)}</span><button class="kw-del" onclick="listDelKW('${it.gid}','${it.kw.replace(/'/g,"\\'")}')">×</button>`;
    wrap.appendChild(div);
  });
}

function listDelKW(gid,kw){
  const g=groups.find(x=>x.id===gid);if(!g)return;
  g.keywords=parseKW(g.keywords).filter(k=>k!==kw).join('\n');
  renderListItems();renderSB();renderBM();save();
  if(activeId===gid)renderCT();
}

function sel(id){activeId=id;renderSB();renderCT();}

function onColor(id,v){
  const g=groups.find(x=>x.id===id);if(!g)return;
  g.color=v;
  document.getElementById('cc').style.background=v;
  document.getElementById('cc').textContent=v.toUpperCase();
  const chip=document.getElementById('pChip');
  if(chip){chip.style.background=v;chip.style.color=luma(v)>140?'#000':'#fff';}
  renderSB();renderBM();save();
}

function delG(id){
  if(!confirm('このグループを削除しますか？'))return;
  groups=groups.filter(g=>g.id!==id);
  if(activeId===id)activeId=groups.length?groups[0].id:null;
  renderSB();renderCT();renderBM();save();toast('削除しました','ok');
}

function renameG(id){
  const g=groups.find(x=>x.id===id);if(!g)return;
  const n=prompt('新しいグループ名:',g.name);if(!n||!n.trim())return;
  g.name=n.trim();renderSB();renderCT();renderBM();save();toast('名前を変更しました','ok');
}

function openAddGroup(){document.getElementById('addName').value='';document.getElementById('addModal').classList.add('on');setTimeout(()=>document.getElementById('addName').focus(),80);}
function closeAddGroup(){document.getElementById('addModal').classList.remove('on');}
function confirmAddGroup(){
  const name=document.getElementById('addName').value.trim();
  if(!name){toast('グループ名を入力してください','err');return;}
  if(groups.find(g=>g.name===name)){toast('同名のグループが既に登録されています','warn');return;}
  const color=PAL[groups.length%PAL.length];
  const id='g'+Date.now();
  groups.push({id,name,color,keywords:''});
  closeAddGroup();sel(id);renderBM();save();toast(`「${name}」を追加しました`,'ok');
}

function backupJSON(){
  const d=new Date();
  const date=d.getFullYear().toString()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  const hhmm=String(d.getHours()).padStart(2,'0')+String(d.getMinutes()).padStart(2,'0');
  const dayKey='hl_bk_cnt_'+date+'_'+hhmm;
  const cnt=(parseInt(localStorage.getItem(dayKey)||'0')+1);
  localStorage.setItem(dayKey,cnt);
  const seq=String(cnt).padStart(2,'0');
  const filename=`highlight_${date}_${hhmm}_${seq}.json`;
  const blob=new Blob([JSON.stringify({version:4,exported:new Date().toISOString(),groups},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
  toast(`保存：${filename}`,'ok');
}

function restoreJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      const imp=Array.isArray(data)?data:(data.groups||[]);
      if(!confirm(`${imp.length}件のデータを復元します。現在のデータは上書きされます。`))return;
      groups=imp;activeId=groups.length?groups[0].id:null;
      renderSB();renderCT();renderBM();save();toast(`${imp.length}件を復元しました`,'ok');
    }catch(err){toast('読み込みに失敗しました','err');}
  };
  r.readAsText(f);e.target.value='';
}

function copyBM(){
  const code=document.getElementById('bmCode').textContent;
  navigator.clipboard.writeText(code).then(()=>{
    const el=document.getElementById('bmCopied');el.classList.add('on');setTimeout(()=>el.classList.remove('on'),1800);
    toast('コピーしました','ok');
  });
}

function luma(hex){
  try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 0.299*r+0.587*g+0.114*b;}catch(e){return 128;}
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className='on '+(type||'');clearTimeout(el._t);el._t=setTimeout(()=>el.className='',2400);}

document.addEventListener('DOMContentLoaded',()=>{
  load();if(groups.length)activeId=groups[0].id;
  renderSB();renderCT();renderBM();
  document.getElementById('addModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAddGroup();});
  document.getElementById('listModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeListModal();});
  document.getElementById('listAddInput').addEventListener('keydown',e=>{if(e.key==='Enter')listAddOne();});
});
</script>
</body>
</html>
